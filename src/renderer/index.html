<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self';
             style-src 'self' 'unsafe-inline' gstrap-plugin:;
             script-src 'self' 'unsafe-eval' gstrap-plugin:;
             img-src 'self' data: file: blob: gstrap-plugin:;
             font-src 'self' data: gstrap-plugin:;
             connect-src 'self' ws: wss: gstrap-plugin:;
             worker-src 'self' blob:;">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GrapeStrap</title>
  <link rel="stylesheet" href="/styles/theme-dark.css">
  <link rel="stylesheet" href="/styles/golden-layout-overrides.css">
  <link rel="stylesheet" href="/styles/monaco-overrides.css">
  <link rel="stylesheet" href="/styles/shell.css">
</head>
<body class="gstrap-shell">
  <div id="gstrap-toolbar"   class="gstrap-toolbar"   data-region="toolbar"></div>
  <div id="gstrap-tabs"      class="gstrap-tabs"      data-region="tabs"></div>
  <div id="gstrap-linkedfiles" class="gstrap-linkedfiles" data-region="linked-files" hidden></div>
  <div id="gstrap-main"      class="gstrap-main"      data-region="golden-layout"></div>
  <div id="gstrap-insert"    class="gstrap-insert"    data-region="insert"></div>
  <div id="gstrap-strip"     class="gstrap-strip"     data-region="property-inspector"></div>
  <div id="gstrap-status"    class="gstrap-status"    data-region="status-bar"></div>

  <div id="gstrap-toasts" class="gstrap-toasts"></div>
  <div id="gstrap-modals" class="gstrap-modals"></div>

  <script type="module" src="/main.js"></script>
</body>
</html>
